# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: virajthakkar60/tigers-eyes
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/3d6f1fcb-85d6-4297-bdeb-79c421debaab/pkce
  auth_token_endpoint: /sites/3d6f1fcb-85d6-4297-bdeb-79c421debaab/token
  gateway_url: https://gateway.decapbridge.com

  # See who did what
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# Enable PKCE fields
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

media_folder: "src/images"
public_folder: "/images"

publish_mode: simple
site_url: https://tigerseyes.co.uk
logo_url: /images/tiger-s-eyes-logo-431ec7f0.webp

collections:
  # ── SITE-WIDE ────────────────────────────────────────────
  - name: "site"
    label: "Contact details (all pages)"
    files:
      - name: "site"
        label: "Phone, email & footer"
        file: "src/_data/site.json"
        fields:
          - { name: phone, label: "Phone number (shown on site)", widget: string }
          - { name: phoneLink, label: "Phone number for tap-to-call (e.g. +447792948745)", widget: string }
          - { name: email, label: "Email address", widget: string }
          - { name: footerLine, label: "Footer line", widget: text }
          - { name: ctaScript, label: "Gold tagline (bottom of every page)", widget: string }
          - { name: ctaSub, label: "Tagline subtitle", widget: string }
          - { name: ctaButton, label: "Bottom button text", widget: string }
          - { name: logo, label: "Logo", widget: image, required: false }

  # ── HOME ─────────────────────────────────────────────────
  - name: "home"
    label: "Home page"
    files:
      - name: "home"
        label: "Home page content"
        file: "src/_data/home.json"
        fields:
          - { name: heroHeadline, label: "Headline (first part)", widget: string }
          - { name: heroHeadlineGold, label: "Headline (gold part)", widget: string }
          - { name: heroScript, label: "Gold script line", widget: string }
          - { name: heroIntro, label: "Intro paragraph", widget: text }
          - { name: servicesHeading, label: "Services heading", widget: string }
          - { name: servicesIntro, label: "Services intro", widget: text }
          - label: "Service cards"
            name: cards
            widget: list
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: price, label: "Price line", widget: string }
              - { name: text, label: "Description", widget: text }
          - { name: meetHeading, label: "'Meet Louise' heading", widget: string }
          - { name: meetSub, label: "'Meet Louise' subtitle", widget: string }
          - { name: meetText1, label: "'Meet Louise' paragraph 1", widget: text }
          - { name: meetText2, label: "'Meet Louise' paragraph 2", widget: text }
          - { name: portrait, label: "Louise's photo", widget: image }

  # ── ABOUT ────────────────────────────────────────────────
  - name: "about"
    label: "About page"
    files:
      - name: "about"
        label: "About page content"
        file: "src/_data/about.json"
        fields:
          - { name: heading, label: "Heading (first part)", widget: string }
          - { name: headingGold, label: "Heading (gold part)", widget: string }
          - { name: portrait, label: "Louise's photo", widget: image }
          - { name: bio, label: "Full bio", widget: text }
          - { name: credHeading, label: "Credentials heading", widget: string }
          - { name: credSub, label: "Credentials subtitle", widget: string }
          - label: "Credential boxes"
            name: creds
            widget: list
            fields:
              - { name: title, label: "Title", widget: string }
              - { name: text, label: "Text", widget: text }

  # ── MICROBLADING ─────────────────────────────────────────
  - name: "microblading"
    label: "Microblading page"
    files:
      - name: "microblading"
        label: "Microblading content & price"
        file: "src/_data/microblading.json"
        fields:
          - { name: heading, label: "Heading (first part)", widget: string }
          - { name: headingGold, label: "Heading (gold part)", widget: string }
          - { name: script, label: "Gold script line", widget: string }
          - { name: sub, label: "Subtitle", widget: string }
          - { name: bodyHeading, label: "Section heading", widget: string }
          - { name: body1, label: "Paragraph 1", widget: text }
          - { name: body2, label: "Paragraph 2", widget: text }
          - { name: note, label: "Important note", widget: text }
          - { name: price, label: "PRICE (e.g. £250)", widget: string }
          - { name: priceLabel, label: "Price label", widget: string }
          - { name: features, label: "What's included (one per line)", widget: list, field: { name: item, label: Item, widget: string } }
          - { name: galleryHeading, label: "Gallery heading", widget: string }
          - label: "Gallery photos"
            name: gallery
            widget: list
            fields:
              - { name: image, label: "Photo", widget: image }
              - { name: caption, label: "Caption", widget: string }

  # ── ARTWORK ──────────────────────────────────────────────
  - name: "artwork"
    label: "Bespoke Artwork page"
    files:
      - name: "artwork"
        label: "Artwork content & prices"
        file: "src/_data/artwork.json"
        fields:
          - { name: heading, label: "Heading (first part)", widget: string }
          - { name: headingGold, label: "Heading (gold part)", widget: string }
          - { name: script, label: "Gold script line", widget: string }
          - { name: featureImage, label: "Main feature photo", widget: image }
          - { name: bodyHeading, label: "Section heading", widget: string }
          - { name: body1, label: "Paragraph", widget: text }
          - { name: body2, label: "PRICES line", widget: text }
          - { name: cta, label: "Button text", widget: string }
          - { name: galleryHeading, label: "Gallery heading", widget: string }
          - label: "Gallery pieces"
            name: gallery
            widget: list
            fields:
              - { name: image, label: "Photo", widget: image }
              - { name: caption, label: "Title", widget: string }
              - { name: description, label: "Description", widget: text }

  # ── TATTOOS ──────────────────────────────────────────────
  - name: "tattoos"
    label: "Tattoos & Prices page"
    files:
      - name: "tattoos"
        label: "Tattoo content & price guide"
        file: "src/_data/tattoos.json"
        fields:
          - { name: heading, label: "Heading (first part)", widget: string }
          - { name: headingGold, label: "Heading (gold part)", widget: string }
          - { name: sub, label: "Subtitle", widget: text }
          - { name: galleryHeading, label: "Gallery heading", widget: string }
          - label: "Gallery photos"
            name: gallery
            widget: list
            fields:
              - { name: image, label: "Photo", widget: image }
              - { name: caption, label: "Caption", widget: text }
          - { name: note, label: "Included-with-every-tattoo note", widget: text }
          - { name: priceHeading, label: "Price guide heading", widget: string }
          - { name: priceIntro, label: "Price guide intro", widget: string }
          - { name: minCharge, label: "Minimum charge badge", widget: string }
          - label: "PRICE GUIDE ROWS"
            name: rows
            widget: list
            fields:
              - { name: name, label: "Tattoo type", widget: string }
              - { name: meta, label: "Size note", widget: string, required: false }
              - { name: price, label: "Price", widget: string }
              - { name: detail, label: "Details", widget: text }
          - { name: deposits, label: "Deposits line", widget: text }
          - { name: depositsNote, label: "Deposits note", widget: string }

  # ── CONTACT ──────────────────────────────────────────────
  - name: "contact"
    label: "Contact / Book Now page"
    files:
      - name: "contact"
        label: "Contact page & locations"
        file: "src/_data/contact.json"
        fields:
          - { name: heading, label: "Heading (first part)", widget: string }
          - { name: headingGold, label: "Heading (gold part)", widget: string }
          - { name: sub, label: "Intro text", widget: text }
          - label: "Studio locations"
            name: locations
            widget: list
            fields:
              - { name: name, label: "Location name", widget: string }
              - { name: address, label: "Address (use <br> for new lines)", widget: text }
          - { name: bookingNote, label: "Booking / deposit note", widget: text }
          - { name: formHeading, label: "Form heading", widget: string }
          - { name: formIntro, label: "Form intro", widget: text }
          - { name: serving, label: "Areas served", widget: text }
